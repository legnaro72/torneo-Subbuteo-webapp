[browser]
gatherUsageStats = false

[server]
# Timeout in secondi prima che una sessione inattiva venga chiusa
cookie_expiry = 86400   # ad esempio: 24 ore

[theme]
# Dark theme di base — gli utenti possono switchare da Settings
base = "dark"
primaryColor = "#009FFD"
backgroundColor = "#0A1128"
secondaryBackgroundColor = "#1C3144"
textColor = "#ffffff"
